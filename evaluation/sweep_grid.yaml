# Phase 4.2 sweep: chunk strategy × chunk size × embedding model (2×2×3 = 12 cells).
# Run from repo root:  uv run snow-sports-rag-sweep
#
# Each cell rebuilds a Chroma index under evaluation/runs/<timestamp>/cells/.

seed: 0

axes:
  chunking.strategy: [markdown_header, recursive_char]
  chunking.chunk_size: [384, 512]
  embedding.model_name:
    - sentence-transformers/all-MiniLM-L6-v2
    - sentence-transformers/all-mpnet-base-v2
    - sentence-transformers/multi-qa-MiniLM-L6-cos-v1
