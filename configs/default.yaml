# Paths are resolved relative to the process current working directory unless absolute.
knowledge_base_path: knowledge-base

chunking:
  strategy: markdown_header
  chunk_size: 512
  chunk_overlap: 64
  min_section_chars: 0
  recursive_separators: ["\n\n", "\n", " ", ""]

embedding:
  backend: sentence_transformers
  model_name: sentence-transformers/all-MiniLM-L6-v2
  normalize: true

vector_store:
  backend: chroma
  persist_directory: .rag_index/chroma
  collection_name: snow_sports_kb
  l1_collection_name: snow_sports_kb_l1

retrieval:
  top_k: 8
  mode: baseline
  l1_shortlist_m: 5
  max_chunks_per_doc: 2
  hierarchical_global_fallback: true

rerank:
  enabled: true
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n_pre_rerank: 48

llm:
  provider: openai_compatible
  model: gpt-4o-mini
  temperature: 0.1

logging:
  level: INFO
