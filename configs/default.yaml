# Paths are resolved relative to the process current working directory unless absolute.
knowledge_base_path: knowledge-base

chunking:
  strategy: markdown_header
  chunk_size: 512
  chunk_overlap: 64
  min_section_chars: 0
  recursive_separators: ["\n\n", "\n", " ", ""]

embedding:
  backend: sentence_transformers
  model_name: sentence-transformers/all-MiniLM-L6-v2
  normalize: true

vector_store:
  backend: chroma
  persist_directory: .rag_index/chroma
  collection_name: snow_sports_kb
  l1_collection_name: snow_sports_kb_l1

retrieval:
  top_k: 8
  mode: baseline
  l1_shortlist_m: 5
  max_chunks_per_doc: 2
  hierarchical_global_fallback: true

rerank:
  enabled: false
  # cross_encoder (local) | openai (listwise chat) | anthropic (listwise)
  backend: cross_encoder
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n_pre_rerank: 48
  top_n_in: 30
  top_k_out: 5
  # openai listwise (inherits llm base_url / api_key_env when unset)
  # openai_model: gpt-4o-mini
  # anthropic_model: claude-3-5-haiku-20241022

llm:
  provider: openai_compatible
  model: gpt-4o-mini
  temperature: 0.1
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  timeout_s: 60.0

query_expansion:
  enabled: false
  num_paraphrases: 3
  fusion: max_score
  rrf_k: 60

generation:
  # Phase 2.4: grounded answers. When disabled, the CLI prints retrieval rows
  # only and does not call an LLM for synthesis.
  enabled: false
  # openai (chat completions) | anthropic (messages) | huggingface (local) | fake
  backend: openai
  temperature: 0.1
  max_tokens: 1024
  # Per-passage character budget injected into the prompt as [SOURCE n] blocks.
  max_chars_per_hit: 1200
  include_section_path: true
  refusal_message: "I don't know based on the provided knowledge base."
  # openai (inherits llm.base_url / llm.api_key_env / llm.timeout_s when unset)
  # openai_model: gpt-4o-mini
  # anthropic_model: claude-3-5-sonnet-20241022
  # hf_model: Qwen/Qwen2.5-3B-Instruct
  # hf_device: cuda
  # hf_dtype: bfloat16

logging:
  level: INFO
